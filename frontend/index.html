<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QOBOX Customer Care</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;600&family=Noto+Sans+Kannada:wght@400;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2a2d3a;
      --accent:    #f97316;
      --accent-2:  #a78bfa;
      --danger:    #f87171;
      --success:   #34d399;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --radius:    12px;
    }

    html, body {
      height: 100%;
      font-family: "Inter", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 24px;
      min-height: 100vh;
    }

    /* ---- Header ---- */
    header { text-align: center; width: 100%; }
    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    header p {
      color: var(--muted);
      font-size: 0.875rem;
      margin-top: 4px;
    }
    header .badge {
      display: inline-block;
      margin-top: 6px;
      padding: 2px 10px;
      border-radius: 20px;
      background: rgba(249,115,22,0.15);
      border: 1px solid rgba(249,115,22,0.4);
      color: var(--accent);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    /* ---- Two-column layout ---- */
    .main-layout {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 24px;
      width: 100%;
      max-width: 1100px;
      flex: 1;
    }

    /* ---- LEFT: Conversation panel ---- */
    .left-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 0;
    }

    #conversation-wrap {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #conversation-header {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #conversation-header::before {
      content: "";
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
    }
    #conversation-header.active::before { background: var(--success); }

    #conversation-log {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 320px;
      max-height: calc(100vh - 260px);
      scroll-behavior: smooth;
    }
    #conversation-log:empty::before {
      content: "Conversation will appear here…";
      color: var(--muted);
      font-size: 0.85rem;
      margin: auto;
      text-align: center;
      padding: 40px 0;
    }

    .msg-row { display: flex; flex-direction: column; gap: 2px; }
    .msg-label {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }
    .msg-label.user  { color: var(--accent);  text-align: right; }
    .msg-label.bot   { color: var(--accent-2); text-align: left; }
    .msg-bubble {
      max-width: 88%;
      padding: 9px 13px;
      border-radius: 10px;
      font-size: 0.93rem;
      line-height: 1.6;
      word-break: break-word;
      font-family: "Noto Naskh Arabic", "Tahoma", "Arial Unicode MS", sans-serif;
      direction: rtl;
      text-align: right;
    }
    .msg-bubble.user {
      background: rgba(249,115,22,0.12);
      border: 1px solid rgba(249,115,22,0.3);
      color: var(--text);
      align-self: flex-end;
    }
    .msg-bubble.bot {
      background: rgba(167,139,250,0.1);
      border: 1px solid rgba(167,139,250,0.25);
      color: var(--text);
      align-self: flex-start;
    }
    .msg-bubble.bot.streaming { opacity: 0.75; }

    /* session ended divider */
    .session-end-divider {
      text-align: center;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      padding: 6px 0;
      opacity: 0.6;
    }

    /* partial ASR — lives below the conversation box */
    #transcript-partial {
      font-size: 0.82rem;
      color: var(--muted);
      font-style: italic;
      text-align: right;
      direction: rtl;
      min-height: 1.1em;
      padding: 2px 6px;
      font-family: "Noto Naskh Arabic", "Tahoma", "Arial Unicode MS", sans-serif;
    }

    /* Download button — shown after session stops */
    #btn-download {
      display: none;
      width: 100%;
      padding: 11px 0;
      border-radius: 8px;
      border: 1px solid var(--success);
      background: rgba(52,211,153,0.08);
      color: var(--success);
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    #btn-download:hover { background: rgba(52,211,153,0.2); }

    /* ---- RIGHT: Controls panel ---- */
    .right-panel {
      width: 300px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 14px;
    }

    /* ---- Selector cards ---- */
    .selector-card {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
    }
    .selector-card label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
      min-width: 54px;
    }
    .selector-card select {
      flex: 1;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 0.92rem;
      font-family: inherit;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }
    .selector-card select:focus  { border-color: var(--accent); }
    .selector-card select:disabled { opacity: 0.5; cursor: not-allowed; }
    .lang-native {
      font-size: 1rem;
      min-width: 32px;
      text-align: center;
      color: var(--accent);
    }

    /* ---- Status orb ---- */
    .orb-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 24px 0 8px;
    }
    .orb {
      width: 90px; height: 90px; border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #2d3146, #0f1117);
      box-shadow: 0 0 20px rgba(249,115,22,0.08);
      transition: background 0.3s, box-shadow 0.3s;
    }
    .orb.idle {
      background: radial-gradient(circle at 35% 35%, #2d3146, #0f1117);
      box-shadow: 0 0 20px rgba(249,115,22,0.08);
    }
    .orb.user-speaking {
      background: radial-gradient(circle at 35% 35%, #c2410c, #7c2d12);
      animation: pulse-user 1s ease-in-out infinite;
    }
    @keyframes pulse-user {
      0%   { box-shadow: 0 0 0 0   rgba(249,115,22,0.7); }
      70%  { box-shadow: 0 0 0 22px rgba(249,115,22,0); }
      100% { box-shadow: 0 0 0 0   rgba(249,115,22,0); }
    }
    .orb.bot-speaking {
      background: radial-gradient(circle at 35% 35%, #7c3aed, #4c1d95);
      animation: pulse-bot 1.2s ease-in-out infinite;
    }
    @keyframes pulse-bot {
      0%   { box-shadow: 0 0 0 0   rgba(139,92,246,0.7); }
      70%  { box-shadow: 0 0 0 26px rgba(139,92,246,0); }
      100% { box-shadow: 0 0 0 0   rgba(139,92,246,0); }
    }
    .orb.thinking {
      background: radial-gradient(circle at 35% 35%, #d97706, #92400e);
      animation: pulse-think 0.8s ease-in-out infinite;
    }
    @keyframes pulse-think {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.55; }
    }
    .orb-label {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      min-height: 1.2em;
    }

    /* ---- Start/Stop button ---- */
    #btn-start {
      width: 100%;
      padding: 14px 0;
      border: none;
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.2s, background 0.2s;
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 20px rgba(249,115,22,0.35);
    }
    #btn-start:hover  { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(249,115,22,0.5); }
    #btn-start:active { transform: translateY(0); }
    #btn-start.active {
      background: var(--danger);
      box-shadow: 0 4px 20px rgba(248,113,113,0.4);
    }
    #btn-start:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ---- Energy meter ---- */
    .meter-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .meter-label { font-size: 0.7rem; color: var(--muted); white-space: nowrap; width: 60px; }
    .meter-track { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    #energy-bar {
      height: 100%; width: 0%; background: var(--accent);
      border-radius: 3px; transition: width 0.08s ease;
    }
    #energy-bar.above-threshold { background: var(--success); }

    /* ---- Status bar ---- */
    #status-bar { font-size: 0.73rem; color: var(--muted); text-align: center; }
    #status-bar span {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
    }

    /* ---- Responsive: stack on narrow screens ---- */
    @media (max-width: 700px) {
      .main-layout { flex-direction: column-reverse; }
      .right-panel  { width: 100%; }
      #conversation-log { max-height: 340px; }
    }
  </style>
</head>
<body>

  <header>
    <h1>QOBOX Customer Care</h1>
    <p>Telugu &amp; Kannada Customer Support</p>
    <span class="badge">Telugu · Kannada · Customer Support</span>
  </header>

  <div class="main-layout">

    <!-- ===== LEFT: Conversation + Download ===== -->
    <div class="left-panel">
      <div id="conversation-wrap">
        <div id="conversation-header">Conversation</div>
        <div id="conversation-log"></div>
      </div>
      <!-- Live partial ASR preview while user is speaking -->
      <div id="transcript-partial"></div>
      <!-- Download button — shown only after session stops -->
      <button id="btn-download" onclick="downloadTranscript()">&#x2B07; Download Transcript</button>
    </div>

    <!-- ===== RIGHT: Controls ===== -->
    <div class="right-panel">

      <!-- Language selector — locked once session starts -->
      <div class="selector-card">
        <label for="lang-select">Language</label>
        <span class="lang-native" id="lang-native">తెలుగు</span>
        <select id="lang-select" onchange="onLanguageChange(this.value)">
          <option value="telugu" selected>Telugu — తెలుగు</option>
          <option value="kannada">Kannada — ಕನ್ನಡ</option>
        </select>
      </div>

      <!-- Voice selector — Male / Female -->
      <div class="selector-card" id="voice-selector">
        <label for="voice-select">Voice</label>
        <select id="voice-select" onchange="onVoiceChange(this.value)">
          <option value="male"   selected>Male</option>
          <option value="female"         >Female</option>
        </select>
      </div>

      <!-- Sarvam female speaker selector — used only when TTS is Sarvam + Voice is Female -->
      <div class="selector-card" id="sarvam-speaker-selector" style="display: none;">
        <label for="sarvam-speaker-select">Sarvam Female Voice</label>
        <select id="sarvam-speaker-select">
          <option value="anushka" selected>Anushka</option>
          <option value="manisha">Manisha</option>
          <option value="vidya">Vidya</option>
          <option value="arya">Arya</option>
          <option value="ritu">Ritu</option>
          <option value="priya">Priya</option>
          <option value="neha">Neha</option>
          <option value="pooja">Pooja</option>
          <option value="simra">Simra</option>
          <option value="kavya">Kavya</option>
          <option value="ishita">Ishita</option>
          <option value="shreya">Shreya</option>
          <option value="roopa">Roopa</option>
          <option value="tanya">Tanya</option>
          <option value="sunny">Sunny</option>
          <option value="suhani">Suhani</option>
          <option value="kavitha">Kavitha</option>
          <option value="rupal">Rupal</option>
        </select>
      </div>

      <!-- STT Engine selector — can be changed mid-session -->
      <div class="selector-card">
        <label for="stt-select">STT</label>
        <select id="stt-select" onchange="onSTTEngineChange(this.value)">
          <option value="auto"    selected>Auto</option>
          <option value="sarvam"          >Sarvam</option>
          <option value="soniox"          >Soniox</option>
          <option value="google"          >Google Cloud</option>
          <option value="azure"           >Microsoft Azure</option>
          <option value="amazon"          >Amazon Transcribe</option>
          <option value="whisper"         >Whisper (local)</option>
        </select>
      </div>

      <!-- TTS Engine selector — locked once session starts -->
      <div class="selector-card">
        <label for="tts-select">TTS</label>
        <select id="tts-select" onchange="onTTSEngineChange(this.value)">
          <option value="auto"         selected>Auto</option>
          <option value="sarvam"               >Sarvam</option>
          <option value="google_tts"           >Google Cloud</option>
          <option value="azure_tts"            >Microsoft Azure</option>
          <option value="amazon_polly"         >Amazon Polly</option>
          <option value="elevenlabs"           >ElevenLabs</option>
          <option value="edge"                 >Edge TTS (free)</option>
          <option value="gtts"                 >gTTS (free)</option>
        </select>
      </div>

      <!-- Sarvam Bulbul v3 emotion preset — applied when Sarvam TTS is used -->
      <div class="selector-card">
        <label for="sarvam-emotion-select">Emotion</label>
        <select id="sarvam-emotion-select" onchange="onSarvamEmotionChange(this.value)">
          <option value="neutral" selected>Neutral</option>
          <option value="calm">Calm</option>
          <option value="warm">Warm</option>
          <option value="empathetic">Empathetic</option>
          <option value="happy">Happy</option>
          <option value="cheerful">Cheerful</option>
          <option value="excited">Excited</option>
          <option value="serious">Serious</option>
        </select>
      </div>

      <!-- LLM Backend selector — locked once session starts -->
      <div class="selector-card">
        <label for="llm-select">LLM</label>
        <select id="llm-select">
          <option value="ollama" selected>Ollama (local)</option>
          <option value="gemini"         >Gemini (cloud ✨)</option>
        </select>
      </div>

      <!-- Orb -->
      <div class="orb-wrapper">
        <div class="orb idle" id="orb"></div>
        <div class="orb-label" id="orb-label">Inactive</div>
      </div>

      <!-- Start / Stop -->
      <button id="btn-start" onclick="toggleSession()">Start Conversation</button>

      <!-- Mic level meter -->
      <div class="meter-wrapper">
        <span class="meter-label">Mic Level</span>
        <div class="meter-track"><div id="energy-bar"></div></div>
      </div>

      <!-- Status -->
      <div id="status-bar"><span id="status-text">Not connected</span></div>

    </div>
  </div><!-- /.main-layout -->

<script>
"use strict";

// ---------------------------------------------------------------------------
// Configuration
// ---------------------------------------------------------------------------
const WS_BASE           = `${location.protocol === "https:" ? "wss" : "ws"}://${location.host}/ws`;
const SEND_INTERVAL_MS  = 100;
const VAD_THRESHOLD        = 0.030;  // raised: rejects background noise in call-centre environments
const VAD_HOLD_FRAMES      = 4;      // frames to confirm user started speaking (4 × 100ms = 400ms)
const VAD_INTERRUPT_FRAMES = 10;     // frames of sustained speech required to interrupt the bot (1 second)
const TTS_GRACE_FRAMES     = 6;      // frames after tts_start where VAD is ignored (600ms echo guard)
const PLAYBACK_SAMPLE_RATE = 24000;
const PREBUFFER_MS      = 100;
let humanizerOfficeEnabled = true;
let humanizerTypingEnabled = true;
let humanizerOfficeGain = 0.018;  // subtle office ambience while bot speaks
let humanizerTypingGain = 0.05;   // very soft keyboard ticks
let humanizerTypingMinMs = 90;
let humanizerTypingMaxMs = 190;
let clientConfigLoaded = false;

// Language display data
const LANG_INFO = {
  telugu:  { native: "తెలుగు",  name: "Telugu" },
  kannada: { native: "ಕನ್ನಡ",  name: "Kannada" },
};

const DEFAULT_SARVAM_FEMALE_SPEAKERS = [
  "anushka", "manisha", "vidya", "arya", "ritu", "priya", "neha", "pooja",
  "simra", "kavya", "ishita", "shreya", "roopa", "tanya", "sunny",
  "suhani", "kavitha", "rupal",
];
const DEFAULT_SARVAM_EMOTIONS = [
  "neutral", "calm", "warm", "empathetic", "happy", "cheerful", "excited", "serious",
];

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let selectedLanguage   = "telugu";
let selectedVoice      = "male";
let selectedSarvamSpeaker = "anushka";
let selectedSarvamEmotion = "neutral";
let selectedSTTEngine  = "auto";
let selectedTTSEngine  = "auto";
let selectedLLMBackend = "ollama";
let sessionLanguage   = "telugu";   // locked at session start — used for all WS reconnects
// Conversation history: [{role:"user"|"bot", text:"...", ts: Date}]
let conversationHistory = [];
let currentBotMsgEl    = null;   // the streaming bot bubble currently being built
let reconnectTimer    = null;     // debounce: only one reconnect pending at a time
let ws                = null;
let audioCtx          = null;
let mediaStream       = null;
let sourceNode        = null;
let analyserNode      = null;
let processorNode     = null;
let sendInterval      = null;
let pcmBuffer         = [];
let sessionActive     = false;
let botSpeaking       = false;
let userSpeaking      = false;
let vadFrameCount     = 0;
let interruptSent     = false;
let ttsGraceFrames    = 0;    // counts down after tts_start; VAD interrupt blocked during this window

// TTS playback queue
let ttsAudioCtx       = null;
let ttsSourceNodes    = [];
let ttsQueue          = [];
let ttsBufferedMs     = 0;
let ttsScheduledUntil = 0;
let ttsPrebufferDone  = false;
let ttsMasterGainNode = null;
let ambienceGainNode  = null;
let ambienceSource    = null;
let typingTimer       = null;

async function loadClientConfig() {
  if (clientConfigLoaded) return;
  try {
    const resp = await fetch("/client-config", { cache: "no-store" });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const cfg = await resp.json();
    const audio = cfg.audio || {};

    humanizerOfficeEnabled = audio.office_background_noise_enabled !== false;
    humanizerTypingEnabled = audio.keyboard_typing_sound_enabled !== false;
    humanizerOfficeGain = parseFiniteNumber(audio.office_background_noise_gain, humanizerOfficeGain, 0, 0.2);
    humanizerTypingGain = parseFiniteNumber(audio.keyboard_typing_sound_gain, humanizerTypingGain, 0, 0.2);
    humanizerTypingMinMs = parseFiniteNumber(audio.keyboard_typing_min_ms, humanizerTypingMinMs, 25, 2000);
    humanizerTypingMaxMs = parseFiniteNumber(audio.keyboard_typing_max_ms, humanizerTypingMaxMs, humanizerTypingMinMs, 3000);
    if (humanizerTypingMaxMs < humanizerTypingMinMs) {
      humanizerTypingMaxMs = humanizerTypingMinMs;
    }

    const sarvam = cfg.sarvam || {};
    const speakers = Array.isArray(sarvam.female_speakers)
      ? sarvam.female_speakers
      : DEFAULT_SARVAM_FEMALE_SPEAKERS;
    populateSarvamSpeakerOptions(speakers);
    const emotions = Array.isArray(sarvam.emotions)
      ? sarvam.emotions
      : DEFAULT_SARVAM_EMOTIONS;
    populateSarvamEmotionOptions(emotions, sarvam.default_emotion);
  } catch (err) {
    console.warn("Using default client config:", err);
  } finally {
    clientConfigLoaded = true;
  }
}

function parseFiniteNumber(value, fallback, min, max) {
  const num = Number(value);
  if (!Number.isFinite(num)) return fallback;
  return Math.min(max, Math.max(min, num));
}

// ---------------------------------------------------------------------------
// DOM
// ---------------------------------------------------------------------------
const orbEl             = document.getElementById("orb");
const orbLabel          = document.getElementById("orb-label");
const btnStart          = document.getElementById("btn-start");
const statusText        = document.getElementById("status-text");
const transcriptPartial = document.getElementById("transcript-partial");
const energyBar         = document.getElementById("energy-bar");
const langSelect        = document.getElementById("lang-select");
const langNative        = document.getElementById("lang-native");
const voiceSelector     = document.getElementById("voice-selector");
const voiceSelect       = document.getElementById("voice-select");
const sarvamSpeakerSelector = document.getElementById("sarvam-speaker-selector");
const sarvamSpeakerSelect   = document.getElementById("sarvam-speaker-select");
const sarvamEmotionSelect   = document.getElementById("sarvam-emotion-select");
const sttSelect         = document.getElementById("stt-select");
const ttsSelect         = document.getElementById("tts-select");
const llmSelect         = document.getElementById("llm-select");
const conversationLog   = document.getElementById("conversation-log");
const conversationHeader= document.getElementById("conversation-header");
const btnDownload       = document.getElementById("btn-download");

// ---------------------------------------------------------------------------
// Language selector
// ---------------------------------------------------------------------------
function onLanguageChange(lang) {
  if (sessionActive) return;   // cannot change language mid-session
  selectedLanguage = lang;
  voiceSelector.style.display = "flex";
  const info = LANG_INFO[lang] || LANG_INFO.telugu;
  langNative.textContent = info.native;
}

function onVoiceChange(voice) {
  selectedVoice = voice;
  updateSarvamSpeakerVisibility();
}

function onTTSEngineChange(engine) {
  selectedTTSEngine = engine;
  updateSarvamSpeakerVisibility();
}

function onSarvamEmotionChange(emotion) {
  selectedSarvamEmotion = emotion;
}

function populateSarvamSpeakerOptions(speakers) {
  const cleanSpeakers = speakers
    .map(speaker => String(speaker).trim().toLowerCase())
    .filter(Boolean);
  const uniqueSpeakers = [...new Set(cleanSpeakers)];
  if (uniqueSpeakers.length === 0) return;

  const currentSpeaker = sarvamSpeakerSelect.value || selectedSarvamSpeaker;
  sarvamSpeakerSelect.innerHTML = "";
  uniqueSpeakers.forEach(speaker => {
    const option = document.createElement("option");
    option.value = speaker;
    option.textContent = speaker.charAt(0).toUpperCase() + speaker.slice(1);
    sarvamSpeakerSelect.appendChild(option);
  });
  sarvamSpeakerSelect.value = uniqueSpeakers.includes(currentSpeaker)
    ? currentSpeaker
    : uniqueSpeakers[0];
  selectedSarvamSpeaker = sarvamSpeakerSelect.value;
  updateSarvamSpeakerVisibility();
}

function populateSarvamEmotionOptions(emotions, defaultEmotion) {
  const cleanEmotions = emotions
    .map(emotion => String(emotion).trim().toLowerCase())
    .filter(Boolean);
  const uniqueEmotions = [...new Set(cleanEmotions)];
  if (uniqueEmotions.length === 0) return;

  const preferredEmotion = String(defaultEmotion || selectedSarvamEmotion || "neutral").toLowerCase();
  sarvamEmotionSelect.innerHTML = "";
  uniqueEmotions.forEach(emotion => {
    const option = document.createElement("option");
    option.value = emotion;
    option.textContent = emotion.charAt(0).toUpperCase() + emotion.slice(1);
    sarvamEmotionSelect.appendChild(option);
  });
  sarvamEmotionSelect.value = uniqueEmotions.includes(preferredEmotion)
    ? preferredEmotion
    : uniqueEmotions[0];
  selectedSarvamEmotion = sarvamEmotionSelect.value;
}

function updateSarvamSpeakerVisibility() {
  const show = voiceSelect.value === "female" && ttsSelect.value === "sarvam";
  sarvamSpeakerSelector.style.display = show ? "flex" : "none";
  sarvamSpeakerSelect.disabled = sessionActive || !show;
}

// ---------------------------------------------------------------------------
// STT engine selector
// ---------------------------------------------------------------------------
function onSTTEngineChange(engine) {
  selectedSTTEngine = engine;
  if (sessionActive) {
    // Send live switch request — backend restarts ASR with the new engine
    sendJSON({ type: "set_stt_engine", engine });
    const labels = { auto: "Auto", sarvam: "Sarvam AI", soniox: "Soniox", google: "Google Cloud", azure: "Microsoft Azure", amazon: "Amazon Transcribe", whisper: "Whisper" };
    setStatus("Switching STT to " + (labels[engine] || engine) + "…");
  }
}

// ---------------------------------------------------------------------------
// UI helpers
// ---------------------------------------------------------------------------
function setOrb(state, label) {
  orbEl.className = `orb ${state}`;
  orbLabel.textContent = label;
}
function setStatus(msg) { statusText.textContent = msg; }

// ---------------------------------------------------------------------------
// Session toggle
// ---------------------------------------------------------------------------
async function toggleSession() {
  if (sessionActive) stopSession();
  else await startSession();
}

async function startSession() {
  await loadClientConfig();

  // Clear previous conversation log and history for a fresh session
  conversationLog.innerHTML = "";
  conversationHistory = [];
  currentBotMsgEl = null;
  btnDownload.style.display = "none";
  conversationHeader.classList.add("active");
  conversationHeader.textContent = "Conversation";

  // Lock language for this session — reconnects must use the same language
  // or a language-change mid-session could start a second session in a
  // different language and play two voices simultaneously.
  sessionLanguage = selectedLanguage;

  selectedTTSEngine  = ttsSelect.value;
  selectedLLMBackend = llmSelect.value;
  selectedSarvamSpeaker = sarvamSpeakerSelect.value;
  selectedSarvamEmotion = sarvamEmotionSelect.value;

  setStatus("Requesting microphone permission…");
  btnStart.disabled = true;
  langSelect.disabled = true;
  voiceSelect.disabled = true;
  sarvamSpeakerSelect.disabled = true;
  sarvamEmotionSelect.disabled = true;
  ttsSelect.disabled = true;
  llmSelect.disabled = true;

  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        channelCount: 1,
        sampleRate: 16000,
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true,
      },
    });
  } catch (err) {
    setStatus("Microphone permission denied: " + err.message);
    btnStart.disabled = false;
    langSelect.disabled = false;
    voiceSelect.disabled = false;
    updateSarvamSpeakerVisibility();
    sarvamEmotionSelect.disabled = false;
    ttsSelect.disabled = false;
    llmSelect.disabled = false;
    return;
  }

  // Capture context — 16kHz for ASR
  audioCtx = new (window.AudioContext || window.webkitAudioContext)({
    sampleRate: 16000,
    latencyHint: "interactive",
  });

  // Playback context — 24kHz for TTS
  ttsAudioCtx = new (window.AudioContext || window.webkitAudioContext)({
    sampleRate: PLAYBACK_SAMPLE_RATE,
    latencyHint: "playback",
  });
  setupPlaybackHumanizer();

  await setupAudioPipeline();
  connectWebSocket();

  sessionActive = true;
  btnStart.textContent = "Stop";
  btnStart.classList.add("active");
  btnStart.disabled = false;

  const info = LANG_INFO[selectedLanguage] || LANG_INFO.telugu;
  setOrb("idle", "Listening");
  setStatus(`Connected — speak in ${info.name} (${info.native})`);
}

function stopSession() {
  sessionActive = false;
  btnStart.textContent = "Start Conversation";
  btnStart.classList.remove("active");
  langSelect.disabled = false;
  voiceSelect.disabled = false;
  updateSarvamSpeakerVisibility();
  sarvamEmotionSelect.disabled = false;
  ttsSelect.disabled = false;
  llmSelect.disabled = false;
  finalizeBotBubble();
  conversationHeader.classList.remove("active");

  // Show download button and session-end marker if there's content
  if (conversationHistory.length > 0) {
    const divider = document.createElement("div");
    divider.className = "session-end-divider";
    divider.textContent = "— Session ended —";
    conversationLog.appendChild(divider);
    conversationLog.scrollTop = conversationLog.scrollHeight;
    btnDownload.style.display = "block";
  }

  if (reconnectTimer)  { clearTimeout(reconnectTimer); reconnectTimer = null; }
  if (sendInterval)    { clearInterval(sendInterval); sendInterval = null; }
  if (processorNode)   { processorNode.disconnect(); processorNode = null; }
  if (sourceNode)      { sourceNode.disconnect();    sourceNode    = null; }
  if (analyserNode)    { analyserNode.disconnect();  analyserNode  = null; }
  if (audioCtx)        { audioCtx.close();           audioCtx      = null; }
  if (mediaStream)     { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }

  ttsSourceNodes.forEach(s => { try { s.stop(0); } catch (_) {} });
  ttsSourceNodes = [];
  stopBackgroundAmbience();
  stopTypingLayer();
  if (ambienceGainNode) { try { ambienceGainNode.disconnect(); } catch (_) {} ambienceGainNode = null; }
  if (ttsMasterGainNode) { try { ttsMasterGainNode.disconnect(); } catch (_) {} ttsMasterGainNode = null; }
  if (ttsAudioCtx)  { ttsAudioCtx.close(); ttsAudioCtx = null; }
  if (ws && ws.readyState === WebSocket.OPEN) ws.close();
  ws = null;

  ttsQueue = []; ttsBufferedMs = 0; ttsPrebufferDone = false;
  ttsScheduledUntil = 0; botSpeaking = false; userSpeaking = false;
  vadFrameCount = 0; interruptSent = false; ttsGraceFrames = 0;
  setOrb("idle", "Inactive");
  setStatus("Not connected");
}

// ---------------------------------------------------------------------------
// Audio pipeline
// ---------------------------------------------------------------------------
async function setupAudioPipeline() {
  sourceNode   = audioCtx.createMediaStreamSource(mediaStream);
  analyserNode = audioCtx.createAnalyser();
  analyserNode.fftSize = 256;
  analyserNode.smoothingTimeConstant = 0.5;
  sourceNode.connect(analyserNode);

  if (audioCtx.audioWorklet) {
    await setupWorklet();
  } else {
    setupScriptProcessor();
  }

  sendInterval = setInterval(sendAudioChunk, SEND_INTERVAL_MS);
}

const WORKLET_CODE = `
class PCMCapture extends AudioWorkletProcessor {
  process(inputs) {
    const ch = inputs[0][0];
    if (ch && ch.length > 0) {
      const copy = new Float32Array(ch);
      this.port.postMessage(copy, [copy.buffer]);
    }
    return true;
  }
}
registerProcessor("pcm-capture", PCMCapture);
`;

async function setupWorklet() {
  const blob = new Blob([WORKLET_CODE], { type: "application/javascript" });
  const url  = URL.createObjectURL(blob);
  await audioCtx.audioWorklet.addModule(url);
  URL.revokeObjectURL(url);
  processorNode = new AudioWorkletNode(audioCtx, "pcm-capture");
  processorNode.port.onmessage = (e) => { pcmBuffer.push(...e.data); };
  analyserNode.connect(processorNode);
  processorNode.connect(audioCtx.destination);
}

function setupScriptProcessor() {
  processorNode = audioCtx.createScriptProcessor(4096, 1, 1);
  processorNode.onaudioprocess = (e) => {
    const s = e.inputBuffer.getChannelData(0);
    pcmBuffer.push(...s);
  };
  analyserNode.connect(processorNode);
  processorNode.connect(audioCtx.destination);
}

// ---------------------------------------------------------------------------
// PCM helpers
// ---------------------------------------------------------------------------
function float32ToInt16PCM(float32Array) {
  const int16 = new Int16Array(float32Array.length);
  for (let i = 0; i < float32Array.length; i++) {
    const s = Math.max(-1, Math.min(1, float32Array[i]));
    int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
  }
  return int16;
}

function int16ToFloat32(int16Array) {
  const float32 = new Float32Array(int16Array.length);
  for (let i = 0; i < int16Array.length; i++) {
    float32[i] = int16Array[i] / 32768.0;
  }
  return float32;
}

function setupPlaybackHumanizer() {
  if (!ttsAudioCtx) return;
  if (ttsMasterGainNode) return;

  ttsMasterGainNode = ttsAudioCtx.createGain();
  ttsMasterGainNode.gain.value = 1.0;
  ttsMasterGainNode.connect(ttsAudioCtx.destination);

  ambienceGainNode = ttsAudioCtx.createGain();
  ambienceGainNode.gain.value = 0.0;
  ambienceGainNode.connect(ttsMasterGainNode);
}

function ensureAmbienceSource() {
  if (!ttsAudioCtx || !ambienceGainNode || ambienceSource) return;
  const durationSec = 2.0;
  const frameCount = Math.floor(PLAYBACK_SAMPLE_RATE * durationSec);
  const noiseBuffer = ttsAudioCtx.createBuffer(1, frameCount, PLAYBACK_SAMPLE_RATE);
  const data = noiseBuffer.getChannelData(0);

  // Colored-noise style shaping to feel like distant office/line ambience.
  let prev = 0;
  for (let i = 0; i < data.length; i++) {
    const white = (Math.random() * 2 - 1) * 0.12;
    prev = 0.985 * prev + white;
    data[i] = prev;
  }

  ambienceSource = ttsAudioCtx.createBufferSource();
  ambienceSource.buffer = noiseBuffer;
  ambienceSource.loop = true;
  ambienceSource.connect(ambienceGainNode);
  ambienceSource.start();
}

function startBackgroundAmbience() {
  if (!humanizerOfficeEnabled) return;
  if (!ttsAudioCtx || !ambienceGainNode) return;
  ensureAmbienceSource();
  const now = ttsAudioCtx.currentTime;
  ambienceGainNode.gain.cancelScheduledValues(now);
  ambienceGainNode.gain.setValueAtTime(ambienceGainNode.gain.value, now);
  ambienceGainNode.gain.linearRampToValueAtTime(humanizerOfficeGain, now + 0.18);
}

function stopBackgroundAmbience() {
  if (!ttsAudioCtx || !ambienceGainNode) return;
  const now = ttsAudioCtx.currentTime;
  ambienceGainNode.gain.cancelScheduledValues(now);
  ambienceGainNode.gain.setValueAtTime(ambienceGainNode.gain.value, now);
  ambienceGainNode.gain.linearRampToValueAtTime(0.0, now + 0.12);
}

function scheduleTypingLayer() {
  if (!humanizerTypingEnabled) return;
  if (!sessionActive || !botSpeaking || !ttsAudioCtx || !ttsMasterGainNode) return;
  if (typingTimer) clearTimeout(typingTimer);
  const delay = humanizerTypingMinMs + Math.random() * (humanizerTypingMaxMs - humanizerTypingMinMs);
  typingTimer = setTimeout(() => {
    playTypingTick();
    scheduleTypingLayer();
  }, delay);
}

function playTypingTick() {
  if (!humanizerTypingEnabled) return;
  if (!ttsAudioCtx || !ttsMasterGainNode || !botSpeaking) return;
  const now = ttsAudioCtx.currentTime;
  const peak = humanizerTypingGain * (0.75 + Math.random() * 0.4);

  const triggerClick = (startAt) => {
    const durationMs = 8 + Math.random() * 8; // short, percussive key tap
    const frameCount = Math.max(64, Math.floor((PLAYBACK_SAMPLE_RATE * durationMs) / 1000));
    const clickBuffer = ttsAudioCtx.createBuffer(1, frameCount, PLAYBACK_SAMPLE_RATE);
    const data = clickBuffer.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
    }

    const src = ttsAudioCtx.createBufferSource();
    const hp = ttsAudioCtx.createBiquadFilter();
    const bp = ttsAudioCtx.createBiquadFilter();
    const gain = ttsAudioCtx.createGain();

    hp.type = "highpass";
    hp.frequency.value = 700;
    bp.type = "bandpass";
    bp.frequency.value = 2200 + Math.random() * 1100;
    bp.Q.value = 1.2;

    gain.gain.value = 0.0;
    src.buffer = clickBuffer;
    src.connect(hp);
    hp.connect(bp);
    bp.connect(gain);
    gain.connect(ttsMasterGainNode);

    const attack = 0.0015;
    const release = 0.02;
    gain.gain.setValueAtTime(0.0, startAt);
    gain.gain.linearRampToValueAtTime(peak, startAt + attack);
    gain.gain.exponentialRampToValueAtTime(0.0001, startAt + attack + release);

    src.start(startAt);
    src.stop(startAt + attack + release + 0.01);
  };

  triggerClick(now);
  if (Math.random() < 0.35) {
    triggerClick(now + (0.02 + Math.random() * 0.03)); // occasional double key hit
  }
}

function stopTypingLayer() {
  if (typingTimer) {
    clearTimeout(typingTimer);
    typingTimer = null;
  }
}

// ---------------------------------------------------------------------------
// Audio chunk sender (every 100ms)
// ---------------------------------------------------------------------------
function sendAudioChunk() {
  if (!ws || ws.readyState !== WebSocket.OPEN || pcmBuffer.length === 0) return;
  const samples = new Float32Array(pcmBuffer);
  pcmBuffer = [];
  const rms = computeRMS(samples);
  updateEnergyMeter(rms);
  checkVAD(rms);
  ws.send(float32ToInt16PCM(samples).buffer);
}

// ---------------------------------------------------------------------------
// VAD
// ---------------------------------------------------------------------------
function computeRMS(arr) {
  let s = 0;
  for (let i = 0; i < arr.length; i++) s += arr[i] * arr[i];
  return Math.sqrt(s / arr.length);
}

function updateEnergyMeter(rms) {
  const pct = Math.min(100, rms * 1000);
  energyBar.style.width = pct + "%";
  energyBar.classList.toggle("above-threshold", rms > VAD_THRESHOLD);
}

function checkVAD(rms) {
  // Grace window: ignore VAD completely for the first TTS_GRACE_FRAMES frames
  // after TTS starts. This prevents the bot's own audio or room echo from
  // immediately triggering a false barge-in interrupt.
  if (ttsGraceFrames > 0) {
    ttsGraceFrames--;
    vadFrameCount = 0;
    return;
  }

  if (rms > VAD_THRESHOLD) {
    vadFrameCount++;

    // Use a higher frame count to interrupt the bot than to detect user speech.
    // While the bot is speaking, require VAD_INTERRUPT_FRAMES (1 second) of
    // sustained energy — background noise spikes won't sustain that long.
    // When the bot is silent, VAD_HOLD_FRAMES (400ms) is enough to confirm speech.
    const holdRequired = botSpeaking ? VAD_INTERRUPT_FRAMES : VAD_HOLD_FRAMES;

    if (vadFrameCount >= holdRequired) {
      if (botSpeaking && !interruptSent) {
        interruptSent = true;
        sendJSON({ type: "interrupt" });
        stopTTSPlayback();
        setOrb("user-speaking", "You are speaking…");
        userSpeaking = true;
      }
      if (!userSpeaking) {
        userSpeaking = true;
        setOrb("user-speaking", "You are speaking…");
      }
    }
  } else {
    vadFrameCount = 0;
    if (userSpeaking) {
      userSpeaking = false;
      if (!botSpeaking) setOrb("idle", "Listening");
    }
    // Only clear interruptSent once the bot has finished speaking.
    // Resetting it on every brief silence (e.g. between TTS sentences)
    // would allow echo from the next sentence to re-trigger the interrupt.
    if (!botSpeaking) interruptSent = false;
  }
}

// ---------------------------------------------------------------------------
// WebSocket
// ---------------------------------------------------------------------------
function connectWebSocket() {
  selectedVoice = voiceSelect.value;
  selectedSarvamSpeaker = selectedVoice === "female" ? sarvamSpeakerSelect.value : "";
  selectedSarvamEmotion = sarvamEmotionSelect.value;
  // Always reconnect with the language that was active when the session
  // started (sessionLanguage), not the current dropdown value — prevents
  // a language-switch + reconnect from spawning a second session in a
  // different language and playing two voices simultaneously.
  const lang = sessionLanguage;
  const wsUrl = `${WS_BASE}?language=${encodeURIComponent(lang)}&voice=${encodeURIComponent(selectedVoice)}&sarvam_speaker=${encodeURIComponent(selectedSarvamSpeaker)}&sarvam_emotion=${encodeURIComponent(selectedSarvamEmotion)}&stt_engine=${encodeURIComponent(selectedSTTEngine)}&tts_engine=${encodeURIComponent(selectedTTSEngine)}&llm_backend=${encodeURIComponent(selectedLLMBackend)}`;
  setStatus("Connecting to server…");
  ws = new WebSocket(wsUrl);
  ws.binaryType = "arraybuffer";

  ws.onopen  = () => { reconnectTimer = null; setStatus("Connected — starting session…"); };
  ws.onclose = (e) => {
    setStatus("Disconnected (code " + e.code + ")");
    if (sessionActive && !reconnectTimer) {
      setOrb("idle", "Reconnecting…");
      reconnectTimer = setTimeout(() => {
        reconnectTimer = null;
        connectWebSocket();
      }, 2000);
    }
  };
  ws.onerror = () => setStatus("WebSocket error");

  ws.onmessage = (event) => {
    if (event.data instanceof ArrayBuffer) onAudioReceived(event.data);
    else if (typeof event.data === "string") onJSONReceived(event.data);
  };
}

function sendJSON(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
}

// ---------------------------------------------------------------------------
// Conversation log helpers
// ---------------------------------------------------------------------------
function addUserBubble(text) {
  const row = document.createElement("div");
  row.className = "msg-row";
  row.innerHTML = `<span class="msg-label user">You</span>
                   <div class="msg-bubble user">${escHtml(text)}</div>`;
  conversationLog.appendChild(row);
  conversationLog.scrollTop = conversationLog.scrollHeight;
  conversationHistory.push({ role: "user", text, ts: new Date() });
}

function startBotBubble() {
  const row = document.createElement("div");
  row.className = "msg-row";
  const bubble = document.createElement("div");
  bubble.className = "msg-bubble bot streaming";
  row.innerHTML = `<span class="msg-label bot">Assistant</span>`;
  row.appendChild(bubble);
  conversationLog.appendChild(row);
  conversationLog.scrollTop = conversationLog.scrollHeight;
  currentBotMsgEl = bubble;
  // ts is set to null here; finalizeBotBubble() stamps it when complete
  conversationHistory.push({ role: "bot", text: "", ts: null });
}

function appendBotFragment(text) {
  if (!currentBotMsgEl) startBotBubble();
  const last = conversationHistory[conversationHistory.length - 1];
  if (last && last.role === "bot") last.text += text + " ";
  currentBotMsgEl.textContent = (currentBotMsgEl.textContent || "") + text + " ";
  conversationLog.scrollTop = conversationLog.scrollHeight;
}

function finalizeBotBubble() {
  if (currentBotMsgEl) {
    currentBotMsgEl.classList.remove("streaming");
    currentBotMsgEl = null;
    // Stamp the timestamp now that the full response is delivered
    const last = conversationHistory[conversationHistory.length - 1];
    if (last && last.role === "bot" && !last.ts) last.ts = new Date();
  }
}

function escHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ---------------------------------------------------------------------------
// Download transcript
// ---------------------------------------------------------------------------
function downloadTranscript() {
  if (!conversationHistory.length) return;
  const langInfo  = LANG_INFO[sessionLanguage] || LANG_INFO.telugu;
  const now       = new Date();
  const dateStr   = now.toISOString().slice(0,19).replace("T"," ");
  const divider   = "─".repeat(52);

  let lines = [
    "Telugu & Kannada Voice Agent — Conversation Transcript",
    divider,
    `Language : ${langInfo.name} (${langInfo.native})`,
    `Date     : ${dateStr}`,
    `Turns    : ${Math.floor(conversationHistory.length / 2)}`,
    divider,
    "",
  ];

  conversationHistory.forEach(({ role, text, ts }, i) => {
    const isUser  = role === "user";
    const label   = isUser ? "You" : "Assistant";
    const time    = ts ? ts.toTimeString().slice(0,8) : "--:--:--";
    if (isUser && i > 0) lines.push(""); // blank line between turns
    lines.push(`[${time}]  ${label}`);
    lines.push(text.trim());
  });

  lines.push("", divider);

  const blob = new Blob([lines.join("\n")], { type: "text/plain;charset=utf-8" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href     = url;
  a.download = `telugu-kannada-transcript-${dateStr.replace(/[ :]/g,"-")}.txt`;
  a.click();
  URL.revokeObjectURL(url);
}

// ---------------------------------------------------------------------------
// WebSocket message handler
// ---------------------------------------------------------------------------
function onJSONReceived(raw) {
  let msg;
  try { msg = JSON.parse(raw); } catch { return; }

  const info = LANG_INFO[selectedLanguage] || LANG_INFO.telugu;

  switch (msg.type) {
    case "session_ready":
      setStatus(`Ready — speak in ${info.name} (${info.native})`);
      break;

    case "transcript_partial":
      transcriptPartial.textContent = msg.text || "";
      break;

    case "transcript_final":
      transcriptPartial.textContent = "";
      addUserBubble(msg.text || "");
      setOrb("thinking", "Thinking…");
      botSpeaking = false;
      break;

    case "bot_text_fragment":
      appendBotFragment(msg.text || "");
      break;

    case "tts_start":
      stopTTSPlayback();
      botSpeaking = true;
      ttsGraceFrames = TTS_GRACE_FRAMES;  // block VAD interrupt for first 600ms
      ttsPrebufferDone = false;
      ttsScheduledUntil = 0;
      ttsBufferedMs = 0;
      // Only open a new bubble if bot_text_fragment hasn't already created one
      if (!currentBotMsgEl) startBotBubble();
      if (ttsAudioCtx && ttsAudioCtx.state !== "running") ttsAudioCtx.resume();
      startBackgroundAmbience();
      scheduleTypingLayer();
      setOrb("bot-speaking", "Assistant speaking…");
      break;

    case "tts_end":
    case "tts_stopped":
      finalizeBotBubble();
      botSpeaking = false;
      interruptSent = false;
      stopBackgroundAmbience();
      stopTypingLayer();
      if (!userSpeaking) setOrb("idle", "Listening");
      break;

    case "stt_engine_changed": {
      const labels = { auto: "Auto", sarvam: "Sarvam AI", soniox: "Soniox", google: "Google Cloud", azure: "Microsoft Azure", amazon: "Amazon Transcribe", whisper: "Whisper" };
      const engineLabel = labels[msg.engine] || msg.engine;
      setStatus(`STT switched to ${engineLabel} — listening…`);
      break;
    }

    case "error":
      setStatus("Error: " + (msg.message || "Unknown error"));
      console.error("Server error:", msg.message);
      break;

    case "pong":
      break;

    default:
      console.debug("Unhandled:", msg.type);
  }
}

// ---------------------------------------------------------------------------
// TTS playback (24kHz PCM)
// ---------------------------------------------------------------------------
function onAudioReceived(arrayBuffer) {
  if (!ttsAudioCtx || !botSpeaking) return;

  const int16 = new Int16Array(arrayBuffer);
  ttsQueue.push(int16);

  const chunkDurationMs = (int16.length / PLAYBACK_SAMPLE_RATE) * 1000;
  ttsBufferedMs += chunkDurationMs;

  if (!ttsPrebufferDone && ttsBufferedMs >= PREBUFFER_MS) {
    ttsPrebufferDone = true;
    drainTTSQueue();
  } else if (ttsPrebufferDone) {
    drainTTSQueue();
  }
}

function drainTTSQueue() {
  if (!ttsAudioCtx) return;
  const now = ttsAudioCtx.currentTime;
  const AHEAD_S = 0.005;
  if (ttsScheduledUntil < now + AHEAD_S) ttsScheduledUntil = now + AHEAD_S;

  while (ttsQueue.length > 0) {
    const int16   = ttsQueue.shift();
    const float32 = int16ToFloat32(int16);
    const buffer  = ttsAudioCtx.createBuffer(1, float32.length, PLAYBACK_SAMPLE_RATE);
    buffer.copyToChannel(float32, 0);

    const source = ttsAudioCtx.createBufferSource();
    source.buffer = buffer;
    source.connect(ttsMasterGainNode || ttsAudioCtx.destination);
    source.start(ttsScheduledUntil);
    ttsSourceNodes.push(source);
    source.addEventListener("ended", () => {
      ttsSourceNodes = ttsSourceNodes.filter(n => n !== source);
    });

    ttsScheduledUntil += float32.length / PLAYBACK_SAMPLE_RATE;
  }
  ttsBufferedMs = 0;
}

function stopTTSPlayback() {
  ttsQueue = [];
  ttsBufferedMs = 0;
  ttsPrebufferDone = false;
  ttsScheduledUntil = 0;
  ttsSourceNodes.forEach(s => { try { s.stop(0); } catch (_) {} });
  ttsSourceNodes = [];
}

// ---------------------------------------------------------------------------
// Keepalive
// ---------------------------------------------------------------------------
setInterval(() => {
  if (ws && ws.readyState === WebSocket.OPEN) sendJSON({ type: "ping" });
}, 25000);
</script>
